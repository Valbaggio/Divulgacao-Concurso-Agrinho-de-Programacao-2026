<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Programação e Equilíbrio</title>
    <style>
        /* Configurações Gerais */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Imagem de Fundo */
        body {
            background: url('imagem.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Principal (Efeito Vidro) */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { margin-bottom: 30px; opacity: 0.9; }

        /* Player de Áudio Customizado */
        .audio-player {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 50px;
            margin-bottom: 30px;
        }

        audio {
            width: 100%;
            filter: invert(100%); /* Torna o player padrão mais visível em fundos escuros */
        }

        /* Container do Vídeo do YouTube */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Agrinho 2026</h1>
        <p>Tema: Equilíbrio entre Produção e Meio Ambiente (Programação)</p>

        <div class="audio-player">
            <audio controls>
                <source src="musica.mp3" type="audio/mpeg">
                Seu navegador não suporta o elemento de áudio.
            </audio>
        </div>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="Vídeo Agrinho 2026" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            Desenvolvido para o Concurso Agrinho 2026 - Paraná
        </div>
    </div>

</body>
</html>
